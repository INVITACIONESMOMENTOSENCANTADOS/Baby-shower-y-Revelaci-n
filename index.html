<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>¡Baby Shower! - Invitación</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    height: 100%;
    width: 100%;
    background: #000;
    font-family: 'Segoe UI', Arial, sans-serif;
    overflow: hidden;
  }
  #stage {
    position: relative;
    width: 100vw;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #000;
  }
  #bgVideo {
    width: 100%;
    height: 100%;
    object-fit: contain;
    background: #000;
  }
  /* Overlay de inicio para permitir el play (autoplay con sonido requiere interacción) */
  #startOverlay {
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.75);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 50;
    text-align: center;
    padding: 20px;
  }
  #startOverlay h1 {
    color: #fff;
    font-size: 1.5rem;
    margin-bottom: 20px;
    font-weight: 400;
  }
  #playBtn {
    background: #ffffff;
    color: #333;
    border: none;
    padding: 16px 40px;
    border-radius: 50px;
    font-size: 1.1rem;
    cursor: pointer;
    box-shadow: 0 4px 15px rgba(0,0,0,0.3);
    transition: transform 0.2s ease;
  }
  #playBtn:hover { transform: scale(1.05); }

  .action-btn {
    position: absolute;
    bottom: 8%;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 14px 28px;
    border-radius: 50px;
    font-size: 1rem;
    font-weight: 600;
    text-decoration: none;
    color: #fff;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.5s ease, transform 0.5s ease;
    box-shadow: 0 6px 20px rgba(0,0,0,0.35);
    z-index: 20;
    white-space: nowrap;
  }
  .action-btn.show {
    opacity: 1;
    pointer-events: auto;
    transform: translateX(-50%) translateY(0);
  }
  .action-btn.hide-fast {
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s ease;
  }
  #locationBtn {
    background: linear-gradient(135deg, #4a90d9, #2563a8);
  }
  #confirmBtn {
    background: linear-gradient(135deg, #25D366, #1aa851);
  }
  .action-btn svg {
    width: 20px;
    height: 20px;
    flex-shrink: 0;
  }

  @media (max-width: 480px) {
    .action-btn {
      font-size: 0.9rem;
      padding: 12px 20px;
      bottom: 6%;
    }
    #startOverlay h1 { font-size: 1.2rem; }
  }
</style>
</head>
<body>

<div id="stage">
  <video id="bgVideo" src="baby-shower.mp4" playsinline preload="auto"></video>

  <div id="startOverlay">
    <h1>💙 ¡Baby Shower! 💙</h1>
    <button id="playBtn">▶ Ver invitación</button>
  </div>

  <a id="locationBtn" class="action-btn" href="https://maps.app.goo.gl/7WuHhc2GRGhtrxqw6" target="_blank" rel="noopener">
    <svg viewBox="0 0 24 24" fill="white"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5A2.5 2.5 0 1 1 12 6.5a2.5 2.5 0 0 1 0 5z"/></svg>
    Ver ubicación
  </a>

  <a id="confirmBtn" class="action-btn" href="https://wa.me/5215640410053?text=%C2%A1Hola!%20Confirmo%20mi%20asistencia%20al%20Baby%20Shower%20%F0%9F%92%99" target="_blank" rel="noopener">
    <svg viewBox="0 0 24 24" fill="white"><path d="M20.52 3.48A11.9 11.9 0 0 0 12.04 0C5.5 0 .2 5.3.2 11.85c0 2.09.55 4.13 1.6 5.93L0 24l6.4-1.68a11.8 11.8 0 0 0 5.63 1.43h.01c6.54 0 11.85-5.3 11.85-11.85 0-3.17-1.24-6.15-3.37-8.42zM12.04 21.4a9.5 9.5 0 0 1-4.85-1.33l-.35-.21-3.8 1 1.01-3.7-.23-.38a9.5 9.5 0 1 1 8.22 4.62zm5.2-7.13c-.28-.14-1.67-.82-1.93-.92-.26-.1-.45-.14-.64.14-.19.28-.74.92-.9 1.1-.17.19-.33.21-.61.07-.28-.14-1.18-.43-2.24-1.38-.83-.74-1.39-1.65-1.55-1.93-.16-.28-.02-.43.12-.57.13-.13.28-.33.42-.5.14-.17.19-.28.28-.47.09-.19.05-.35-.02-.5-.07-.14-.64-1.54-.87-2.11-.23-.55-.47-.48-.64-.49-.17-.01-.36-.01-.55-.01-.19 0-.5.07-.76.35-.26.28-1 1-1 2.42 0 1.43 1.02 2.8 1.16 3 .14.19 2 3.05 4.84 4.28.68.29 1.2.47 1.62.6.68.22 1.3.19 1.79.11.55-.08 1.67-.68 1.9-1.34.24-.66.24-1.22.17-1.34-.07-.12-.26-.19-.54-.33z"/></svg>
    Confirmar asistencia
  </a>
</div>

<script>
  const video = document.getElementById('bgVideo');
  const playBtn = document.getElementById('playBtn');
  const startOverlay = document.getElementById('startOverlay');
  const locationBtn = document.getElementById('locationBtn');
  const confirmBtn = document.getElementById('confirmBtn');

  const LOCATION_TIME = 21; // segundo en que aparece el botón de ubicación
  const CONFIRM_TIME = 39;  // segundo en que aparece el botón de confirmación

  let locationShown = false;
  let confirmShown = false;

  playBtn.addEventListener('click', () => {
    startOverlay.style.display = 'none';
    video.muted = false;
    video.play().catch(() => {
      // si falla con audio, intenta silenciado
      video.muted = true;
      video.play();
    });
  });

  video.addEventListener('timeupdate', () => {
    const t = video.currentTime;

    if (t >= LOCATION_TIME && !locationShown) {
      locationBtn.classList.add('show');
      locationShown = true;
    }
    if (t >= CONFIRM_TIME && !confirmShown) {
      confirmBtn.classList.add('show');
      confirmShown = true;
    }

    // Si el usuario retrocede el video antes de esos puntos, ocultamos de nuevo
    if (t < LOCATION_TIME && locationShown) {
      locationBtn.classList.remove('show');
      locationShown = false;
    }
    if (t < CONFIRM_TIME && confirmShown) {
      confirmBtn.classList.remove('show');
      confirmShown = false;
    }
  });

  // Al terminar el video, deja los botones visibles (por si ya aparecieron)
  video.addEventListener('ended', () => {
    if (locationShown) locationBtn.classList.add('show');
    if (confirmShown) confirmBtn.classList.add('show');
  });
</script>

</body>
</html>
