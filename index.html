<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>¡Baby Shower! - Invitación</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    height: 100%;
    width: 100%;
    background: #000;
    font-family: 'Segoe UI', Arial, sans-serif;
    overflow: hidden;
  }
  #stage {
    position: relative;
    width: 100vw;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #000;
  }
  #bgVideo {
    width: 100%;
    height: 100%;
    object-fit: contain;
    object-position: center;
    background: #000;
    display: block;
  }
  #startOverlay {
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.8);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 50;
    text-align: center;
    padding: 20px;
    backdrop-filter: blur(5px);
    transition: opacity 0.5s ease;
  }
  #startOverlay h1 {
    color: #fff;
    font-size: 1.8rem;
    margin-bottom: 24px;
    font-weight: 400;
    letter-spacing: 1px;
  }
  #startOverlay .hearts {
    font-size: 1.8rem;
    filter: sepia(1) saturate(2) hue-rotate(-10deg) brightness(0.85);
  }
  #playBtn {
    background: #6F4E37;
    color: #fff;
    border: none;
    padding: 16px 40px;
    border-radius: 50px;
    font-size: 1.2rem;
    cursor: pointer;
    box-shadow: 0 4px 20px rgba(111, 78, 55, 0.4);
    transition: all 0.3s ease;
    display: flex;
    align-items: center;
    gap: 10px;
    font-weight: 600;
  }
  #playBtn:hover { 
    transform: scale(1.05);
    background: #845e43;
    box-shadow: 0 6px 24px rgba(111, 78, 55, 0.6);
  }

  .action-btn {
    position: absolute;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    border-radius: 50px;
    font-weight: 600;
    text-decoration: none;
    color: #ffffff;
    background: #6F4E37;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.5s ease, transform 0.2s ease;
    box-shadow: 0 6px 18px rgba(0,0,0,0.45);
    z-index: 20;
    white-space: nowrap;
    overflow: hidden;
  }
  .action-btn.show {
    opacity: 1;
    pointer-events: auto;
  }
  .action-btn:active {
    transform: scale(0.95);
  }
  .action-btn svg {
    width: 1.2em;
    height: 1.2em;
    flex-shrink: 0;
  }
</style>
</head>
<body>

<div id="stage">
  <!-- El video ahora apunta de forma local. Asegúrate de guardarlo con el mismo nombre exacto -->
  <video id="bgVideo" src="¡Baby Shower!.mp4" playsinline preload="auto"></video>

  <div id="startOverlay">
    <h1><span class="hearts">🤎</span> ¡Baby Shower! <span class="hearts">🤎</span></h1>
    <button id="playBtn">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor" style="display:inline-block; vertical-align:middle;">
        <path d="M8 5v14l11-7z"/>
      </svg>
      Ver invitación
    </button>
  </div>

  <a id="locationBtn" class="action-btn" href="https://maps.app.goo.gl/7WuHhc2GRGhtrxqw6" target="_blank" rel="noopener">
    <svg viewBox="0 0 24 24" fill="white"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5A2.5 2.5 0 1 1 12 6.5a2.5 2.5 0 0 1 0 5z"/></svg>
    <span>Ver ubicación</span>
  </a>

  <a id="confirmBtn" class="action-btn" href="https://wa.me/5215640410053?text=%C2%A1Hola!%20Confirmo%20mi%20asistencia%20al%20Baby%20Shower%20%F0%9F%A4%8E" target="_blank" rel="noopener">
    <svg viewBox="0 0 24 24" fill="white"><path d="M20.52 3.48A11.9 11.9 0 0 0 12.04 0C5.5 0 .2 5.3.2 11.85c0 2.09.55 4.13 1.6 5.93L0 24l6.4-1.68a11.8 11.8 0 0 0 5.63 1.43h.01c6.54 0 11.85-5.3 11.85-11.85 0-3.17-1.24-6.15-3.37-8.42zM12.04 21.4a9.5 9.5 0 0 1-4.85-1.33l-.35-.21-3.8 1 1.01-3.7-.23-.38a9.5 9.5 0 1 1 8.22 4.62zm5.2-7.13c-.28-.14-1.67-.82-1.93-.92-.26-.1-.45-.14-.64.14-.19.28-.74.92-.9 1.1-.17.19-.33.21-.61.07-.28-.14-1.18-.43-2.24-1.38-.83-.74-1.39-1.65-1.55-1.93-.16-.28-.02-.43.12-.57.13-.13.28-.33.42-.5.14-.17.19-.28.28-.47.09-.19.05-.35-.02-.5-.07-.14-.64-1.54-.87-2.11-.23-.55-.47-.48-.64-.49-.17-.01-.36-.01-.55-.01-.19 0-.5.07-.76.35-.26.28-1 1-1 2.42 0 1.43 1.02 2.8 1.16 3 .14.19 2 3.05 4.84 4.28.68.29 1.2.47 1.62.6.68.22 1.3.19 1.79.11.55-.08 1.67-.68 1.9-1.34.24-.66.24-1.22.17-1.34-.07-.12-.26-.19-.54-.33z"/></svg>
    <span>Confirmar asistencia</span>
  </a>
</div>

<script>
  const video = document.getElementById('bgVideo');
  const stage = document.getElementById('stage');
  const playBtn = document.getElementById('playBtn');
  const startOverlay = document.getElementById('startOverlay');
  const locationBtn = document.getElementById('locationBtn');
  const confirmBtn = document.getElementById('confirmBtn');

  const LOCATION_TIME = 21; // segundo en que aparece el botón de ubicación
  const CONFIRM_TIME = 39;  // segundo en que aparece el botón de confirmación

  // Posición de los botones calculada proporcionalmente al vídeo real (1080 x 1920)
  const BTN_SPEC = {
    centerXFrac: 0.5,      // Centrado horizontal
    centerYFrac: 0.814,    // Alrededor del 81.4% de la altura
    widthFrac: 0.52,       // Ancho relativo al video
    minHeightPx: 46,       // Mínimo accesible táctil
    heightFrac: 0.045
  };

  let locationShown = false;
  let confirmShown = false;

  function getVideoRect() {
    const vw = video.videoWidth || 1080;
    const vh = video.videoHeight || 1920;
    const cw = stage.clientWidth;
    const ch = stage.clientHeight;
    const videoRatio = vw / vh;
    const containerRatio = cw / ch;
    let renderWidth, renderHeight, offsetX, offsetY;

    if (containerRatio > videoRatio) {
      renderHeight = ch;
      renderWidth = ch * videoRatio;
      offsetX = (cw - renderWidth) / 2;
      offsetY = 0;
    } else {
      renderWidth = cw;
      renderHeight = cw / videoRatio;
      offsetX = 0;
      offsetY = (ch - renderHeight) / 2;
    }
    return { left: offsetX, top: offsetY, width: renderWidth, height: renderHeight };
  }

  function positionButton(btn) {
    const rect = getVideoRect();
    const btnWidth = rect.width * BTN_SPEC.widthFrac;
    const btnHeight = Math.max(rect.height * BTN_SPEC.heightFrac, BTN_SPEC.minHeightPx);
    const centerX = rect.left + rect.width * BTN_SPEC.centerXFrac;
    const centerY = rect.top + rect.height * BTN_SPEC.centerYFrac;

    btn.style.width = btnWidth + 'px';
    btn.style.height = btnHeight + 'px';
    btn.style.left = (centerX - btnWidth / 2) + 'px';
    btn.style.top = (centerY - btnHeight / 2) + 'px';
    btn.style.fontSize = Math.max(btnHeight * 0.34, 12) + 'px';
  }

  function positionAllButtons() {
    positionButton(locationBtn);
    positionButton(confirmBtn);
  }

  window.addEventListener('resize', positionAllButtons);
  video.addEventListener('loadedmetadata', positionAllButtons);

  playBtn.addEventListener('click', () => {
    startOverlay.style.opacity = '0';
    setTimeout(() => {
      startOverlay.style.display = 'none';
    }, 500);
    
    positionAllButtons();
    video.muted = false;
    video.play().catch(() => {
      // Intenta reproducir con mute si el navegador de todas formas bloquea el sonido
      video.muted = true;
      video.play();
    });
  });

  video.addEventListener('timeupdate', () => {
    const t = video.currentTime;

    // Control de botón de ubicación
    if (t >= LOCATION_TIME && !locationShown) {
      positionButton(locationBtn);
      locationBtn.classList.add('show');
      locationShown = true;
    }
    // Control de botón de confirmación
    if (t >= CONFIRM_TIME && !confirmShown) {
      positionButton(confirmBtn);
      confirmBtn.classList.add('show');
      confirmShown = true;
    }

    // Ocultar si el usuario retrocede el video manualmente
    if (t < LOCATION_TIME && locationShown) {
      locationBtn.classList.remove('remove'); // Reset clase para ocultar
      locationBtn.classList.remove('show');
      locationShown = false;
    }
    if (t < CONFIRM_TIME && confirmShown) {
      confirmBtn.classList.remove('show');
      confirmShown = false;
    }
  });

  video.addEventListener('ended', () => {
    if (locationShown) locationBtn.classList.add('show');
    if (confirmShown) confirmBtn.classList.add('show');
  });

  // Intentar posicionar en la carga inicial
  positionAllButtons();
</script>

</body>
</html>
