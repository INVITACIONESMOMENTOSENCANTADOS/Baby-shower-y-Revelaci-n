<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mi baby shower y revelación 🧸🍼✨</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    height: 100%;
    width: 100%;
    /* Color crema cálido elegante */
    background: #FAF6F0;
    font-family: 'Segoe UI', Arial, sans-serif;
    overflow: hidden;
  }
  
  #stage {
    position: relative;
    width: 100vw;
    height: 100vh;
    height: 100dvh; 
    display: flex;
    align-items: center;
    justify-content: center;
    background: #FAF6F0;
  }
  #bgVideo {
    position: absolute;
    background: #FAF6F0;
    display: block;
  }

  #startOverlay {
    position: absolute;
    inset: 0;
    background: rgba(250, 246, 240, 0.9);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 50;
    text-align: center;
    padding: 20px;
    backdrop-filter: blur(8px);
    transition: opacity 0.5s ease;
  }
  #startOverlay h1 {
    color: #6F4E37;
    font-size: 1.8rem;
    margin-bottom: 24px;
    font-weight: 600;
    letter-spacing: 1px;
  }
  #startOverlay .hearts {
    font-size: 1.8rem;
  }
  #playBtn {
    background: #6F4E37;
    color: #fff;
    border: none;
    padding: 16px 36px;
    border-radius: 50px;
    font-size: 1.15rem;
    cursor: pointer;
    box-shadow: 0 4px 20px rgba(111, 78, 55, 0.3);
    transition: all 0.3s ease;
    display: flex;
    align-items: center;
    gap: 10px;
    font-weight: 600;
  }
  #playBtn:hover { 
    transform: scale(1.05);
    background: #845e43;
    box-shadow: 0 6px 24px rgba(111, 78, 55, 0.5);
  }

  .action-btn {
    position: absolute;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    border-radius: 50px;
    font-weight: 600;
    text-decoration: none;
    color: #ffffff;
    background: #6F4E37;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.5s ease, transform 0.2s ease, width 0.3s ease;
    box-shadow: 0 6px 18px rgba(111, 78, 55, 0.3);
    z-index: 20;
    white-space: nowrap;
    overflow: hidden;
    border: none;
    cursor: pointer;
  }
  .action-btn.show {
    opacity: 1;
    pointer-events: auto;
  }
  .action-btn:active {
    transform: scale(0.95);
  }
  .action-btn svg {
    width: 1.2em;
    height: 1.2em;
    flex-shrink: 0;
  }

  .seeker-container {
    position: absolute;
    z-index: 30;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.5s ease;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 10px 0;
  }
  .seeker-container.show {
    opacity: 1;
    pointer-events: auto;
  }
  .seeker-bar {
    -webkit-appearance: none;
    appearance: none;
    width: 100%;
    height: 6px;
    border-radius: 10px;
    background: rgba(111, 78, 55, 0.25);
    outline: none;
    cursor: pointer;
    transition: background 0.3s;
  }
  .seeker-bar::-webkit-slider-thumb {
    -webkit-appearance: none;
    appearance: none;
    width: 16px;
    height: 16px;
    border-radius: 50%;
    background: #6F4E37;
    border: 2px solid #fff;
    cursor: pointer;
    box-shadow: 0 2px 8px rgba(111, 78, 55, 0.4);
    transition: transform 0.1s;
  }
  .seeker-bar::-webkit-slider-thumb:hover {
    transform: scale(1.25);
  }
  .seeker-bar::-moz-range-thumb {
    width: 16px;
    height: 16px;
    border-radius: 50%;
    background: #6F4E37;
    border: 2px solid #fff;
    cursor: pointer;
    box-shadow: 0 2px 8px rgba(111, 78, 55, 0.4);
    transition: transform 0.1s;
  }

  #nameModal {
    display: none;
    position: absolute;
    inset: 0;
    background: rgba(111, 78, 55, 0.4);
    backdrop-filter: blur(8px);
    z-index: 100;
    align-items: center;
    justify-content: center;
    padding: 24px;
    transition: opacity 0.3s ease;
  }
  .modal-content {
    background: #fff;
    padding: 30px;
    border-radius: 28px;
    max-width: 400px;
    width: 100%;
    text-align: center;
    box-shadow: 0 15px 35px rgba(111, 78, 55, 0.15);
    border: 3px solid #6F4E37;
    transform: scale(0.9);
    transition: transform 0.3s ease;
  }
  #nameModal.show-modal {
    display: flex;
  }
  #nameModal.show-modal .modal-content {
    transform: scale(1);
  }
  .modal-content h2 {
    color: #6F4E37;
    font-size: 1.6rem;
    margin-bottom: 12px;
    font-weight: 600;
  }
  .modal-content p {
    color: #555;
    font-size: 0.95rem;
    line-height: 1.4;
    margin-bottom: 20px;
  }
  .modal-content input {
    width: 100%;
    padding: 14px 20px;
    border-radius: 50px;
    border: 2px solid #E6DCD3;
    font-size: 1rem;
    margin-bottom: 20px;
    outline: none;
    text-align: center;
    transition: border-color 0.3s;
    font-family: inherit;
  }
  .modal-content input:focus {
    border-color: #6F4E37;
  }
  .modal-buttons {
    display: flex;
    gap: 12px;
    justify-content: center;
  }
  .modal-btn {
    padding: 12px 24px;
    border-radius: 50px;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    border: none;
    transition: background 0.2s, transform 0.1s;
  }
  .modal-btn-cancel {
    background: #F4EFEA;
    color: #6F4E37;
  }
  .modal-btn-cancel:hover {
    background: #E6DCD3;
  }
  .modal-btn-confirm {
    background: #6F4E37;
    color: #fff;
    flex-grow: 1;
    box-shadow: 0 4px 10px rgba(111, 78, 55, 0.3);
  }
  .modal-btn-confirm:hover {
    background: #845e43;
  }
</style>
</head>
<body>

<div id="stage">
  <video id="bgVideo" src="¡Baby Shower!.mp4" playsinline preload="auto"></video>

  <!-- Overlay Inicial -->
  <div id="startOverlay">
    <h1><span class="hearts">🤎</span> ¡Baby Shower! <span class="hearts">🤎</span></h1>
    <button id="playBtn">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor" style="display:inline-block; vertical-align:middle;">
        <path d="M8 5v14l11-7z"/>
      </svg>
      <!-- Texto cambiado a petición del usuario -->
      Mi revelación y baby shower 🧸
    </button>
  </div>

  <!-- Botón de Ubicación -->
  <a id="locationBtn" class="action-btn" href="https://www.google.com/maps/place/19%C2%B021%2754.1%22N+99%C2%B001%2751.9%22W/@19.3650188,-99.0336494,1240m/data=!3m2!1e3!4b1!4m4!3m3!8m2!3d19.3650188!4d-99.0310745?hl=es&entry=ttu&g_ep=EgoyMDI2MDcwOC4wIKXMDSoASAFQAw%3D%3D" target="_blank" rel="noopener">
    <svg viewBox="0 0 24 24" fill="white"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5A2.5 2.5 0 1 1 12 6.5a2.5 2.5 0 0 1 0 5z"/></svg>
    <span>Ver ubicación</span>
  </a>

  <!-- Botón de Confirmación (Físicamente un 10% más largo) -->
  <button id="confirmBtn" class="action-btn">
    <svg viewBox="0 0 24 24" fill="white"><path d="M20.52 3.48A11.9 11.9 0 0 0 12.04 0C5.5 0 .2 5.3.2 11.85c0 2.09.55 4.13 1.6 5.93L0 24l6.4-1.68a11.8 11.8 0 0 0 5.63 1.43h.01c6.54 0 11.85-5.3 11.85-11.85 0-3.17-1.24-6.15-3.37-8.42zM12.04 21.4a9.5 9.5 0 0 1-4.85-1.33l-.35-.21-3.8 1 1.01-3.7-.23-.38a9.5 9.5 0 1 1 8.22 4.62zm5.2-7.13c-.28-.14-1.67-.82-1.93-.92-.26-.1-.45-.14-.64.14-.19.28-.74.92-.9 1.1-.17.19-.33.21-.61.07-.28-.14-1.18-.43-2.24-1.38-.83-.74-1.39-1.65-1.55-1.93-.16-.28-.02-.43.12-.57.13-.13.28-.33.42-.5.14-.17.19-.28.28-.47.09-.19.05-.35-.02-.5-.07-.14-.64-1.54-.87-2.11-.23-.55-.47-.48-.64-.49-.17-.01-.36-.01-.55-.01-.19 0-.5.07-.76.35-.26.28-1 1-1 2.42 0 1.43 1.02 2.8 1.16 3 .14.19 2 3.05 4.84 4.28.68.29 1.2.47 1.62.6.68.22 1.3.19 1.79.11.55-.08 1.67-.68 1.9-1.34.24-.66.24-1.22.17-1.34-.07-.12-.26-.19-.54-.33z"/></svg>
    <span>Confirmar asistencia</span>
  </button>

  <!-- Contenedor del Seeker -->
  <div id="seekerContainer" class="seeker-container">
    <input type="range" id="seekerBar" class="seeker-bar" min="0" max="100" value="0">
  </div>

  <!-- Modal para pedir el nombre -->
  <div id="nameModal">
    <div class="modal-content">
      <h2>¿Quién nos acompaña? 🧸</h2>
      <p>Por favor, escribe tu nombre completo para enviar la confirmación de asistencia por WhatsApp:</p>
      <input type="text" id="guestName" placeholder="Escribe tu nombre aquí" autocomplete="off" required>
      <div class="modal-buttons">
        <button id="cancelModalBtn" class="modal-btn modal-btn-cancel">Cancelar</button>
        <button id="submitNameBtn" class="modal-btn modal-btn-confirm">Confirmar</button>
      </div>
    </div>
  </div>
</div>

<script>
  const video = document.getElementById('bgVideo');
  const stage = document.getElementById('stage');
  const playBtn = document.getElementById('playBtn');
  const startOverlay = document.getElementById('startOverlay');
  const locationBtn = document.getElementById('locationBtn');
  const confirmBtn = document.getElementById('confirmBtn');

  // Seeker
  const seekerContainer = document.getElementById('seekerContainer');
  const seekerBar = document.getElementById('seekerBar');

  // Modal
  const nameModal = document.getElementById('nameModal');
  const guestNameInput = document.getElementById('guestName');
  const cancelModalBtn = document.getElementById('cancelModalBtn');
  const submitNameBtn = document.getElementById('submitNameBtn');

  // Ajustes de tiempos (Ubicación se quita 1 segundo antes: de 19.5 a 30.5 segundos)
  const LOCATION_START = 19.5;  
  const LOCATION_DURATION = 11; // Reducido de 12 a 11 para quitarse 1 segundo antes
  const LOCATION_END = LOCATION_START + LOCATION_DURATION; // Termina en el segundo 30.5

  // Confirmación dura un 10% más en pantalla (de 10s a 11s)
  const CONFIRM_START = 37.5;   
  const CONFIRM_DURATION = 11;  // Ampliado de 10 a 11 segundos
  const CONFIRM_END = CONFIRM_START + CONFIRM_DURATION; 

  // Configuración de dimensiones de los botones
  const LOCATION_SPEC = {
    centerXFrac: 0.5,      
    widthFrac: 0.52,       
    minHeightPx: 46,       
    heightFrac: 0.045,
    centerYFrac: 0.914     
  };

  // Botón confirmar: un 10% más largo físicamente (widthFrac sube de 0.52 a 0.57)
  const CONFIRM_SPEC = {
    centerXFrac: 0.5,      
    widthFrac: 0.57,       // Aumentado un 10% para hacerlo más largo en pantalla
    minHeightPx: 46,       
    heightFrac: 0.045,
    centerYFrac: 0.924     
  };

  const SEEKER_SPEC = {
    centerXFrac: 0.5,
    centerYFrac: 0.965,
    widthFrac: 0.82
  };

  let locationShown = false;
  let confirmShown = false;
  let isDragging = false;

  function getVideoRect() {
    const vw = video.videoWidth || 1080;
    const vh = video.videoHeight || 1920;
    const cw = stage.clientWidth;
    const ch = stage.clientHeight;
    const videoRatio = vw / vh;
    const containerRatio = cw / ch;
    let renderWidth, renderHeight, offsetX, offsetY;

    if (containerRatio > videoRatio) {
      renderHeight = ch;
      renderWidth = ch * videoRatio;
      offsetX = (cw - renderWidth) / 2;
      offsetY = 0;
    } else {
      renderWidth = cw;
      renderHeight = cw / videoRatio;
      offsetX = 0;
      
      const centeredOffsetY = (ch - renderHeight) / 2;
      const shiftUp = ch * 0.10; // Sube la pantalla un 10%
      offsetY = centeredOffsetY - shiftUp;
      
      if (offsetY < 0) {
        offsetY = 0;
      }
    }
    return { left: offsetX, top: offsetY, width: renderWidth, height: renderHeight };
  }

  function positionButton(btn, spec, rect) {
    const btnWidth = rect.width * spec.widthFrac;
    const btnHeight = Math.max(rect.height * spec.heightFrac, spec.minHeightPx);
    const centerX = rect.left + rect.width * spec.centerXFrac;
    const centerY = rect.top + rect.height * spec.centerYFrac;

    btn.style.width = btnWidth + 'px';
    btn.style.height = btnHeight + 'px';
    btn.style.left = (centerX - btnWidth / 2) + 'px';
    btn.style.top = (centerY - btnHeight / 2) + 'px';
    btn.style.fontSize = Math.max(btnHeight * 0.34, 12) + 'px';
  }

  function positionSeeker(rect) {
    const seekerWidth = rect.width * SEEKER_SPEC.widthFrac;
    const centerX = rect.left + rect.width * SEEKER_SPEC.centerXFrac;
    const centerY = rect.top + rect.height * SEEKER_SPEC.centerYFrac;

    seekerContainer.style.width = seekerWidth + 'px';
    seekerContainer.style.left = (centerX - seekerWidth / 2) + 'px';
    seekerContainer.style.top = (centerY - 18) + 'px'; 
  }

  function positionAllElements() {
    const rect = getVideoRect();
    video.style.width = rect.width + 'px';
    video.style.height = rect.height + 'px';
    video.style.left = rect.left + 'px';
    video.style.top = rect.top + 'px';

    positionButton(locationBtn, LOCATION_SPEC, rect);
    positionButton(confirmBtn, CONFIRM_SPEC, rect);
    positionSeeker(rect);
  }

  window.addEventListener('resize', positionAllElements);
  video.addEventListener('loadedmetadata', positionAllElements);

  playBtn.addEventListener('click', () => {
    startOverlay.style.opacity = '0';
    setTimeout(() => {
      startOverlay.style.display = 'none';
    }, 500);
    
    positionAllElements();
    seekerContainer.classList.add('show');
    
    video.muted = false;
    video.play().catch(() => {
      video.muted = true;
      video.play();
    });
  });

  seekerBar.addEventListener('input', () => {
    isDragging = true;
    if (video.duration) {
      video.currentTime = (seekerBar.value / 100) * video.duration;
    }
  });

  const stopDrag = () => {
    isDragging = false;
  };

  seekerBar.addEventListener('change', stopDrag);
  seekerBar.addEventListener('mouseup', stopDrag);
  seekerBar.addEventListener('touchend', stopDrag);

  confirmBtn.addEventListener('click', (e) => {
    e.preventDefault();
    video.pause(); 
    nameModal.classList.add('show-modal');
    guestNameInput.focus();
  });

  cancelModalBtn.addEventListener('click', () => {
    nameModal.classList.remove('show-modal');
    guestNameInput.value = ''; 
    guestNameInput.style.borderColor = '#E6DCD3';
    video.play(); 
  });

  submitNameBtn.addEventListener('click', () => {
    const name = guestNameInput.value.trim();
    if (!name) {
      guestNameInput.style.borderColor = '#ff4d4d'; 
      guestNameInput.focus();
      return;
    }

    const baseText = `¡Hola! Confirmo mi asistencia al Baby Shower 🍼✨. Mi nombre es: ${name} 🧸`;
    const waUrl = `https://wa.me/5215640410053?text=${encodeURIComponent(baseText)}`;
    
    window.open(waUrl, '_blank');
    
    nameModal.classList.remove('show-modal');
    guestNameInput.value = '';
    guestNameInput.style.borderColor = '#E6DCD3';
    video.play();
  });

  guestNameInput.addEventListener('input', () => {
    guestNameInput.style.borderColor = '#E6DCD3';
  });

  guestNameInput.addEventListener('keypress', (e) => {
    if (e.key === 'Enter') {
      submitNameBtn.click();
    }
  });

  video.addEventListener('timeupdate', () => {
    const t = video.currentTime;

    if (!isDragging && video.duration) {
      seekerBar.value = (t / video.duration) * 100;
    }

    const rect = getVideoRect();

    // Botón de ubicación (19.5 a 30.5s - se quita un segundo antes)
    if (t >= LOCATION_START && t < LOCATION_END) {
      if (!locationShown) {
        positionButton(locationBtn, LOCATION_SPEC, rect);
        locationBtn.classList.add('show');
        locationShown = true;
      }
    } else {
      if (locationShown && !video.ended) {
        locationBtn.classList.remove('show');
        locationShown = false;
      }
    }

    // Botón de confirmación (37.5 a 48.5s)
    if (t >= CONFIRM_START && t < CONFIRM_END) {
      if (!confirmShown) {
        positionButton(confirmBtn, CONFIRM_SPEC, rect);
        confirmBtn.classList.add('show');
        confirmShown = true;
      }
    } else {
      if (confirmShown && !video.ended) {
        confirmBtn.classList.remove('show');
        confirmShown = false;
      }
    }
  });

  video.addEventListener('ended', () => {
    const rect = getVideoRect();
    positionButton(locationBtn, LOCATION_SPEC, rect);
    locationBtn.classList.add('show');
    locationShown = true;

    positionButton(confirmBtn, CONFIRM_SPEC, rect);
    confirmBtn.classList.add('show');
    confirmShown = true;
  });

  positionAllElements();
</script>

</body>
</html>
